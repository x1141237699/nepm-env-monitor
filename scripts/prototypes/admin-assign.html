<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>系统管理员端-指派网格员</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <div class="page">
    <div class="header"><h1>东软环保公众监督系统 - 管理员端</h1><span class="user">管理员：admin</span></div>
    <div class="sidebar">
      <div class="menu-item active">反馈列表</div>
      <div class="menu-item">统计看板</div>
    </div>
    <div class="main">
      <div class="card">
        <div class="card-title">指派网格员 - 反馈 #1</div>
        <div class="detail-row"><span class="detail-label">网格地址</span><span class="detail-value">沈阳市和平区南京街网格</span></div>
        <div class="form-group">
          <label>选择网格员</label>
          <select>
            <option>李网格 (grid001) - 沈阳市</option>
            <option>王网格 (grid002) - 大连市</option>
          </select>
        </div>
        <div class="form-group">
          <label>指派备注</label>
          <textarea placeholder="请输入指派备注（可选）">请尽快前往实地检测AQI数据</textarea>
        </div>
        <button class="btn btn-primary">确认指派</button>
        <button class="btn btn-default">取消</button>
      </div>
    </div>
  </div>
</body>
</html>
