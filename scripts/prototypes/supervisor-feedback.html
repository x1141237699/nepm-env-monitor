<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>公众监督员端-提交反馈</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <div class="mobile-page">
    <div class="mobile-header">提交AQI监督反馈</div>
    <div class="mobile-content">
      <div class="mobile-card">
        <div class="detail-row"><span class="detail-label">网格地址</span><span class="detail-value">沈阳市和平区南京街网格</span></div>
        <div class="form-group">
          <label>预估AQI级别</label>
          <select><option>优</option><option>良</option><option selected>轻度污染</option><option>中度污染</option></select>
        </div>
        <div class="form-group">
          <label>反馈描述</label>
          <textarea placeholder="请描述当前空气质量情况">该区域近期空气质量较差，有明显雾霾，建议安排检测。</textarea>
        </div>
        <div class="form-group"><label>上传图片（可选）</label><input type="text" placeholder="点击上传现场照片"></div>
        <button class="mobile-btn">提交反馈</button>
      </div>
    </div>
  </div>
</body>
</html>
