<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>网格员端-确认AQI数据</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <div class="mobile-page">
    <div class="mobile-header">确认指派网格AQI数据</div>
    <div class="mobile-content">
      <div class="mobile-card">
        <div class="detail-row"><span class="detail-label">网格地址</span><span class="detail-value">沈阳市和平区南京街网格</span></div>
        <div class="detail-row"><span class="detail-label">监督员反馈</span><span class="detail-value">预估轻度污染</span></div>
        <div class="form-group">
          <label>实测AQI值</label>
          <input type="number" value="135" placeholder="请输入实测AQI值">
        </div>
        <div class="form-group">
          <label>确认AQI级别</label>
          <select><option>优</option><option>良</option><option selected>轻度污染</option><option>中度污染</option></select>
        </div>
        <div class="form-group">
          <label>检测备注</label>
          <textarea placeholder="请输入实地检测备注">经实地检测，AQI值为135，属于轻度污染范围。</textarea>
        </div>
        <button class="mobile-btn">提交确认</button>
      </div>
    </div>
  </div>
</body>
</html>
