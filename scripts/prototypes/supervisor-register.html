<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>公众监督员端-注册</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <div class="mobile-page">
    <div class="mobile-header">公众监督员注册</div>
    <div class="mobile-content">
      <div class="mobile-card">
        <div class="form-group"><label>账号</label><input type="text" placeholder="请输入账号"></div>
        <div class="form-group"><label>姓名</label><input type="text" placeholder="请输入姓名"></div>
        <div class="form-group"><label>手机号</label><input type="text" placeholder="请输入手机号"></div>
        <div class="form-group"><label>密码</label><input type="password" placeholder="请输入密码"></div>
        <div class="form-group"><label>确认密码</label><input type="password" placeholder="请再次输入密码"></div>
        <button class="mobile-btn">注 册</button>
        <p style="text-align:center;margin-top:16px;font-size:14px;color:#909399;">已有账号？<a href="#" style="color:#409EFF;">去登录</a></p>
      </div>
    </div>
  </div>
</body>
</html>
