<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>公众监督员端-选择网格</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <div class="mobile-page">
    <div class="mobile-header">选择网格地址</div>
    <div class="mobile-content">
      <div class="mobile-card">
        <div class="form-group"><label>选择省份</label><select><option>辽宁省</option></select></div>
        <div class="form-group"><label>选择城市</label><select><option>沈阳市</option><option>大连市</option></select></div>
        <div class="form-group"><label>选择网格</label></div>
        <div class="grid-select">
          <div class="grid-item selected">和平区<br>南京街网格</div>
          <div class="grid-item">沈河区<br>中街网格</div>
          <div class="grid-item">铁西区<br>兴华街网格</div>
        </div>
        <button class="mobile-btn">下一步：提交反馈</button>
      </div>
    </div>
  </div>
</body>
</html>
